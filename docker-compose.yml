services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: wise-finance-api:latest
    container_name: wise-finance-api
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      HOST: 0.0.0.0
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
        EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY}
        EXPO_PUBLIC_CONVEX_URL: ${EXPO_PUBLIC_CONVEX_URL}
        EXPO_PUBLIC_ENABLE_AUTH_PROVIDERS: ${EXPO_PUBLIC_ENABLE_AUTH_PROVIDERS:-true}
    image: wise-finance-web:latest
    container_name: wise-finance-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
